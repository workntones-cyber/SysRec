<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>モニター選択</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", sans-serif;
    background: rgba(0,0,0,0.75);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  h2 { font-size: 15px; padding: 14px 18px 10px; color: #eee; }
  #list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 0 18px 18px;
    overflow-y: auto;
    flex: 1;
  }
  .item {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    width: 220px;
    background: #222;
    transition: border-color 0.15s;
  }
  .item:hover { border-color: #e74c3c; }
  .item img { width: 100%; height: 124px; object-fit: cover; display: block; background: #000; }
  .item .info { padding: 8px 10px; }
  .item .name {
    font-size: 13px;
    font-weight: 700;
    color: #eee;
    margin-bottom: 3px;
  }
  .item .res {
    font-size: 11px;
    color: #aaa;
  }
  #cancelBtn {
    margin: 0 18px 14px;
    padding: 8px;
    background: #444;
    color: #eee;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  #cancelBtn:hover { background: #555; }
</style>
</head>
<body>
  <h2>録画する画面を選択してください</h2>
  <div id="list"></div>
  <button id="cancelBtn">キャンセル</button>
<script src="monitor-picker.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { position: fixed; inset: 0; cursor: crosshair; }
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    font-size: 14px;
    padding: 7px 18px;
    border-radius: 6px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }
  #confirmBar {
    position: fixed;
    display: none;
    gap: 8px;
    z-index: 20;
  }
  #confirmBar button {
    padding: 6px 14px;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    font-family: "Segoe UI", sans-serif;
  }
  #confirmBtn { background: #e74c3c; color: #fff; }
  #cancelBtn  { background: #555; color: #fff; }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">ドラッグして範囲を選択（Esc でキャンセル）</div>
  <div id="confirmBar">
    <button id="confirmBtn">この範囲で決定</button>
    <button id="cancelBtn">キャンセル</button>
  </div>
<script src="overlay.js"></script>
</body>
</html>

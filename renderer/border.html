<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  #border {
    position: fixed;
    inset: 0;
    border: 3px solid #e74c3c;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
  <div id="border"></div>
</body>
</html>

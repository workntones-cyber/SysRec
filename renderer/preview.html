<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>録画プレビュー</title>
<style>
  body {
    margin: 0;
    background: #1c1c20;
    color: #eee;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }
  video {
    width: 100%;
    max-height: 360px;
    background: #000;
    border-radius: 6px;
  }
  #path {
    font-size: 12px;
    color: #aaa;
    margin: 8px 0;
    word-break: break-all;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    background: #3a3a44;
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: #4a4a56; }
</style>
</head>
<body>
  <video id="video" controls autoplay></video>
  <div id="path"></div>
  <button id="openFolderBtn">保存フォルダを開く</button>
<script src="preview.js"></script>
</body>
</html>
